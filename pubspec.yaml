name: cabinet_checker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  file_picker: ^8.0.0
  archive: ^3.6.1
  xml: ^6.6.1
  geolocator: ^14.0.2
  image_picker: ^1.1.2
  external_app_launcher: ^4.0.3
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  csv: ^6.0.0
  excel: ^4.0.6
  intl: ^0.20.2
  android_intent_plus: ^6.0.0
  syncfusion_flutter_xlsio: ^29.2.11
  image: ^4.3.0
  flutter_keyboard_visibility: ^6.0.0
  get: ^4.7.3
  auto_size_text: ^3.0.0
  flutter_svg: ^2.2.4
  hive: ^2.2.3
  connectivity_plus: ^6.0.2
  flutter_background: ^1.3.1
  flutter_native_splash: ^2.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/icons/logo.png"
  min_sdk_android: 21 # android min sdk min:16, default 21 ic_launcher
  web:
    generate: true
    image_path: "assets/icons/logo.png"
    background_color: "#hexcode"
    theme_color: "#hexcode"
  windows:
    generate: true
    image_path: "assets/icons/logo.png"
    icon_size: 48 # min:48, max:256, default: 48
  macos:
    generate: true
    image_path: "assets/icons/logo.png"
    #    flutter pub run flutter_launcher_icons

dependency_overrides:
  intl: ^0.18.0
  js: ^0.6.7

flutter:

  uses-material-design: true

  assets:
    - assets/icons/

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700

flutter_native_splash:
  # https://pub.dev/packages/flutter_native_splash
  # To Create: dart run flutter_native_splash:create
  # To restore default: dart run flutter_native_splash:remove

  color: "#F2F2F2"
  # background_image: "assets/dark-background.png"
  # splash image, must be png file and density 4x pixel.
  image: assets/icons/logo_splash.png
  # The branding image must be a png file. It is supported for Android, iOS and the Web.
  # branding: assets/images/ic_branding.png


  # Android 12 handles the splash screen differently than previous versions.  Please visit
  # https://developer.android.com/guide/topics/ui/splash-screen
  # Following are Android 12 specific parameter.
  android_12:
    # Please note that the splash screen will be clipped to a circle on the center of the screen.
    # App icon with an icon background: This should be 960×960 pixels, and fit within a circle
    # 640 pixels in diameter.
    # App icon without an icon background: This should be 1152×1152 pixels, and fit within a circle
    # 768 pixels in diameter.
    image: assets/icons/logo_splash.png
    # Splash screen background color.
    color: "#F2F2F2"
    # App icon background color.
    # icon_background_color: "#17202A"
    # The branding property allows you to specify an image used as branding in the splash screen.
    # branding: assets/images/ic_branding.png

  #icon_background_color_dark: "#17202A"