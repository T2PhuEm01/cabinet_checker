name: cabinet_checker
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  file_picker: ^8.0.0
  archive: ^3.6.1
  xml: ^6.6.1
  geolocator: ^14.0.2
  image_picker: ^1.1.2
  external_app_launcher: ^4.0.3
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  url_launcher: ^6.3.1
  path_provider: ^2.1.5
  csv: ^6.0.0
  excel: ^4.0.6
  intl: ^0.20.2
  android_intent_plus: ^6.0.0
  syncfusion_flutter_xlsio: ^29.2.11
  image: ^4.3.0
  flutter_keyboard_visibility: ^6.0.0
  get: ^4.7.3
  auto_size_text: ^3.0.0
  flutter_svg: ^2.2.4
  hive: ^2.2.3
  connectivity_plus: ^6.0.2
  flutter_background: ^1.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

dependency_overrides:
  intl: ^0.18.0
  js: ^0.6.7

flutter:

  uses-material-design: true

  assets:
    - assets/icons/

